name: Publish

# Publishes on every pushed tag like v1.0.1
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # crates.io OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test

      # ---- 1) Publish to crates.io (OIDC trusted publishing, no token) ----
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # ---- 2) Create a GitHub Release for the tag ----
      # (crates/Cargo are not supported by GitHub Packages, so no GH Packages step here)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
